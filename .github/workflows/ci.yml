name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma-Client generieren (kein DB-Zugriff nötig).
      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Build ist DB-frei (DB-Seiten sind force-dynamic). Dummy-URLs reichen.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: ci-secret-placeholder-min-16-characters
          UPLOAD_TOKEN_SECRET: ci-upload-secret-placeholder-min-16-chars
